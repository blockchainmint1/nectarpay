name: POS APK

# Builds a signed Android APK for the NectarPay POS terminal app.
#
# One-time setup — add these as GitHub repo secrets (Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of your keystore.jks (see scripts/generate-keystore.sh)
#   ANDROID_STORE_PASSWORD     the store password used when creating the keystore
#   ANDROID_KEY_ALIAS          the alias used when creating the keystore
#   ANDROID_KEY_PASSWORD       the alias's password (usually same as store password)
#
# Optional — for auto-publishing the download URL back to Lovable Cloud:
#   SUPABASE_URL               your Lovable Cloud project URL
#   SUPABASE_SERVICE_ROLE_KEY  service-role key (uploads to `pos-releases` bucket)
#
# Triggers:
#   push to `pos-app` branch  → build + upload artifact
#   git tag `pos-v*`          → build + create GitHub Release + publish to Lovable Cloud
#   manual (workflow_dispatch) → build + upload artifact

on:
  push:
    branches: [pos-app]
    tags: ['pos-v*']
  workflow_dispatch:
    inputs:
      test_url:
        description: 'Diagnostic build: load https://httpbin.org/get instead of nectar-pay.com/pos'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - uses: oven-sh/setup-bun@v2

      - name: Install web deps
        run: bun install --frozen-lockfile

      - name: Build web app
        env:
          NECTAR_TEST_URL: ${{ github.event.inputs.test_url == 'true' && '1' || '' }}
        run: bun run build

      - name: Sync Capacitor (picks up NECTAR_TEST_URL)
        env:
          NECTAR_TEST_URL: ${{ github.event.inputs.test_url == 'true' && '1' || '' }}
        run: bunx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/keystore.jks
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/keystore.jks
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV

      - name: Derive version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/pos-v* ]]; then
            V="${GITHUB_REF#refs/tags/pos-v}"
          else
            V="0.1.$(date +%Y%m%d%H%M)"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "version_code=$(date +%y%m%d%H)" >> $GITHUB_OUTPUT

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          unzip -q gradle-8.11.1-bin.zip
          sudo mv gradle-8.11.1 /opt/gradle
          sudo ln -sf /opt/gradle/bin/gradle /usr/local/bin/gradle

      - name: Build APK
        working-directory: android
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.ver.outputs.version }}
          VERSION_CODE: ${{ steps.ver.outputs.version_code }}
        run: |
          chmod +x gradlew || true
          if [ ! -f gradlew ]; then
            # First run: bootstrap the wrapper from the installed Gradle.
            gradle wrapper --gradle-version 8.11.1
            chmod +x gradlew
          fi
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/release/app-release.apk \
             out/nectar-pos-${{ steps.ver.outputs.version }}.apk
          (cd out && sha256sum nectar-pos-*.apk > SHA256SUMS)

      - uses: actions/upload-artifact@v4
        with:
          name: nectar-pos-${{ steps.ver.outputs.version }}
          path: out/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/pos-v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          name: NectarPay POS ${{ steps.ver.outputs.version }}
          generate_release_notes: true

      - name: Publish to Lovable Cloud
        if: startsWith(github.ref, 'refs/tags/pos-v')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY not set — skipping cloud publish."
            exit 0
          fi
          APK="out/nectar-pos-${VERSION}.apk"
          SHA=$(sha256sum "$APK" | awk '{print $1}')
          OBJECT="nectar-pos-${VERSION}.apk"
          # Upload to private bucket `pos-releases` via service key.
          curl -fsS -X POST "$SUPABASE_URL/storage/v1/object/pos-releases/$OBJECT" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@$APK"
          # Insert release row (apk_path stored as bucket/object so the
          # /pos-apk route can slice it and mint signed URLs).
          curl -fsS -X POST "$SUPABASE_URL/rest/v1/pos_releases" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"version\":\"$VERSION\",\"apk_path\":\"pos-releases/$OBJECT\",\"sha256\":\"$SHA\"}"

