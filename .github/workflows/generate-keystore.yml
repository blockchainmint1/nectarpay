name: Generate Android Keystore

# One-time setup helper. Run this manually, copy the four values it prints,
# then paste them into GitHub → Settings → Secrets and variables → Actions.
#
# It also uploads the keystore file as an artifact — download and keep it safe
# (1Password, offline backup). Losing it means you can never update existing
# terminal installations.

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key alias (default: nectar-pos)'
        required: false
        default: 'nectar-pos'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore + random password
        id: gen
        run: |
          ALIAS="${{ github.event.inputs.alias }}"
          PASS="nectar-$(openssl rand -hex 12)"
          KS="nectar-pos-release.jks"

          keytool -genkeypair -v \
            -keystore "$KS" \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 4096 -validity 10950 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=NectarPay POS, OU=Nectar.Pay, O=Honest Money, C=US"

          B64=$(base64 -w 0 "$KS")

          echo "keystore_base64=$B64" >> $GITHUB_OUTPUT
          echo "alias=$ALIAS" >> $GITHUB_OUTPUT
          echo "password=$PASS" >> $GITHUB_OUTPUT

          # Also write a plain-text summary file into the artifact
          mkdir -p keystore-info
          echo "ANDROID_KEYSTORE_BASE64=" >  keystore-info/secrets.txt
          echo "$B64"                      >> keystore-info/secrets.txt
          echo ""                          >> keystore-info/secrets.txt
          echo "ANDROID_KEY_ALIAS=$ALIAS"  >> keystore-info/secrets.txt
          echo "ANDROID_STORE_PASSWORD=$PASS" >> keystore-info/secrets.txt
          echo "ANDROID_KEY_PASSWORD=$PASS"   >> keystore-info/secrets.txt

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: nectar-pos-release-keystore
          path: |
            nectar-pos-release.jks
            keystore-info/secrets.txt

      - name: Print secrets for copy-paste
        run: |
          echo "========================================"
          echo "COPY THESE INTO GITHUB SECRETS"
          echo "========================================"
          echo ""
          echo "Secret name: ANDROID_KEYSTORE_BASE64"
          echo "Value:"
          echo "${{ steps.gen.outputs.keystore_base64 }}"
          echo ""
          echo "Secret name: ANDROID_KEY_ALIAS"
          echo "Value: ${{ steps.gen.outputs.alias }}"
          echo ""
          echo "Secret name: ANDROID_STORE_PASSWORD"
          echo "Value: ${{ steps.gen.outputs.password }}"
          echo ""
          echo "Secret name: ANDROID_KEY_PASSWORD"
          echo "Value: ${{ steps.gen.outputs.password }}"
          echo ""
          echo "========================================"
          echo "Download the artifact 'nectar-pos-release-keystore'"
          echo "from this run and keep the .jks file safe."
          echo "========================================"
